name: Deploy Learning Map site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python site/build.py
      # 自訂網域 learningmap.prisma.vision：在 repo Settings → Pages 設定，
      # 或取消下一行註解直接寫入 CNAME
      # - run: echo "learningmap.prisma.vision" > site/dist/CNAME
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - uses: actions/deploy-pages@v4
